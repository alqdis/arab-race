<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سباق الدول العربية</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:1080px;height:1920px;
  overflow:hidden;
  background:linear-gradient(180deg,#050515 0%,#0a0a2e 40%,#080820 100%);
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  color:white;
  display:flex;flex-direction:column;
  padding:30px 25px;gap:14px;
}

/* HEADER */
.header{
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,215,0,0.08);
  border:2px solid rgba(255,215,0,0.3);
  border-radius:24px;padding:18px 30px;
  flex-shrink:0;
}
.race-title{color:#FFD700;font-size:42px;font-weight:bold}
.timer-box{
  background:rgba(255,215,0,0.15);
  border:2px solid rgba(255,215,0,0.5);
  color:#FFD700;padding:10px 30px;
  border-radius:30px;font-size:44px;font-weight:bold;
}

/* LEADERBOARD */
.lb{
  background:rgba(255,215,0,0.06);
  border:1.5px solid rgba(255,215,0,0.2);
  border-radius:20px;padding:16px 24px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;flex-wrap:wrap;
}
.lb-title{color:#FFD700;font-size:32px;white-space:nowrap;font-weight:bold}
.lb-item{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;padding:6px 16px;font-size:28px;
}
.lb-wins{background:#FFD700;color:#000;border-radius:10px;padding:2px 10px;font-size:26px;font-weight:bold}

/* TRACKS */
.tracks{display:flex;flex-direction:column;gap:10px;flex:1;overflow:hidden}

.track-row{
  display:flex;align-items:center;
  gap:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:22px;
  padding:14px 18px;
  flex:1;
}

/* LEFT INFO */
.left-info{
  display:flex;align-items:center;gap:10px;
  min-width:280px;max-width:280px;
  direction:rtl;
}
.rnk{font-size:28px;min-width:36px;text-align:center}
.flag-big{font-size:48px;min-width:58px}
.name-gift{display:flex;flex-direction:column;gap:4px;text-align:right}
.cname{font-size:30px;color:white;font-weight:600;white-space:nowrap}
.gift-row{display:flex;align-items:center;gap:6px;flex-direction:row-reverse}
.gift-img{width:44px;height:44px;object-fit:contain;border-radius:8px}
.gift-name{font-size:22px;color:#FFD700;white-space:nowrap;overflow:hidden;max-width:130px;text-overflow:ellipsis}

/* TRACK BAR - left to right */
.track-wrap{
  flex:1;height:44px;
  background:rgba(255,255,255,0.08);
  border-radius:22px;
  position:relative;overflow:visible;
  direction:ltr;
}
.track-bar{
  height:100%;border-radius:22px;
  min-width:0;
  transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
.flag-runner{
  position:absolute;top:50%;
  transform:translateY(-50%);
  font-size:38px;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,0.8));
  transition:left 0.5s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;z-index:2;left:0;
}
.pts-box{
  min-width:60px;text-align:center;
  font-size:28px;color:rgba(255,255,255,0.7);
  font-weight:bold;
}

/* BOTTOM */
.bottom-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.04);
  border-radius:20px;padding:14px 20px;
  flex-shrink:0;direction:rtl;
}
.bottom-title{font-size:26px;color:rgba(255,255,255,0.5);white-space:nowrap}
.gifter-item{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.08);
  border-radius:14px;padding:6px 14px;font-size:24px;
}
.gifter-badge{background:rgba(255,215,0,0.2);color:#FFD700;border-radius:8px;padding:2px 8px;font-size:22px;font-weight:bold}
.feed-text{flex:1;font-size:24px;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl}

/* WIN */
.win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.win-overlay.show{display:flex}
.win-flag-big{font-size:180px;animation:popIn 0.4s ease}
.win-country{font-size:120px;font-weight:bold;color:#FFD700;text-shadow:0 0 60px rgba(255,215,0,1);animation:glow 0.6s ease infinite alternate;margin:20px 0;text-align:center}
.win-sub{font-size:60px;color:rgba(255,255,255,0.7)}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:199;display:none}
.confetti-c.show{display:block}
.cp{position:absolute;width:16px;height:26px;border-radius:4px;animation:fall linear forwards}

@keyframes popIn{0%{transform:scale(0.3);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes glow{from{text-shadow:0 0 40px rgba(255,215,0,0.6)}to{text-shadow:0 0 100px rgba(255,215,0,1)}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(1920px) rotate(720deg);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div class="race-title">🏁 سباق الدول العربية</div>
  <div class="timer-box" id="timer">05:00</div>
</div>

<div class="lb">
  <div class="lb-title">🏆</div>
  <div id="lbGrid" style="display:flex;gap:8px;flex-wrap:wrap"><span style="font-size:26px;color:rgba(255,255,255,0.3)">ابدأ السباق!</span></div>
</div>

<div class="tracks" id="tracks"></div>

<div class="bottom-bar">
  <div class="bottom-title">🎁</div>
  <div id="giftersList" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  <div class="feed-text" id="feedLine">أرسل هديتك لتحريك علم بلدك!</div>
</div>

<div class="confetti-c" id="confetti"></div>
<div class="win-overlay" id="winOverlay">
  <div class="win-flag-big" id="winFlag"></div>
  <div class="win-country" id="winName"></div>
  <div class="win-sub">فازت بالجولة! 🎉</div>
</div>

<script>
const SUPABASE_URL='https://ujofadjgzwediczrgqjh.supabase.co';
const SUPABASE_KEY='sb_publishable_AHqxelXqBjIwD0obji49qw_3hvgYGXx';
const BASE='https://alqdis.github.io/arab-race/';

function getFlag(code){return[...code].map(c=>String.fromCodePoint(c.charCodeAt(0)+127397)).join('')}

const COUNTRIES=[
  {name:'السعودية',code:'SA',gift:'أحب السعودية',img:'sa.webp',color:'#1B5E20'},
  {name:'الكويت',code:'KW',gift:'جبتها صح GG',img:'kw.webp',color:'#B71C1C'},
  {name:'الإمارات',code:'AE',gift:'روز',img:'ae.webp',color:'#0D47A1'},
  {name:'مصر',code:'EG',gift:'أحبني',img:'eg.webp',color:'#BF360C'},
  {name:'قطر',code:'QA',gift:'أحبك كثيراً',img:'qa.webp',color:'#4A148C'},
  {name:'عُمان',code:'OM',gift:'نغمة فرح',img:'om.webp',color:'#004D40'},
  {name:'البحرين',code:'BH',gift:'TikTok',img:'bh.webp',color:'#880E4F'},
  {name:'العراق',code:'IQ',gift:'يالا يا حبيبي',img:'iq.webp',color:'#311B92'},
  {name:'الجزائر',code:'DZ',gift:'عصا مضيئة',img:'dz.webp',color:'#1A237E'},
  {name:'المغرب',code:'MA',gift:'أحب المغرب',img:'ma.webp',color:'#7F0000'},
  {name:'ليبيا',code:'LY',gift:'آيس كريم',img:'ly.webp',color:'#006064'},
];

const MAX=100;
let scores=new Array(11).fill(0);
let wins=new Array(11).fill(0);
let prevWins=new Array(11).fill(0);
let prevScores=new Array(11).fill(0);
let seconds=300,busy=false,topGifters=[];
const medals=['🥇','🥈','🥉'];

function renderTracks(){
  document.getElementById('tracks').innerHTML=COUNTRIES.map((c,i)=>`
    <div class="track-row">
      <div class="left-info">
        <div class="rnk" id="rank${i}">-</div>
        <div class="flag-big">${getFlag(c.code)}</div>
        <div class="name-gift">
          <div class="cname">${c.name}</div>
          <div class="gift-row">
            <img class="gift-img" src="${BASE}${c.img}" alt="${c.gift}">
            <span class="gift-name">${c.gift}</span>
          </div>
        </div>
      </div>
      <div class="track-wrap">
        <div class="track-bar" id="bar${i}" style="width:0%;background:${c.color}"></div>
        <span class="flag-runner" id="runner${i}">${getFlag(c.code)}</span>
      </div>
      <div class="pts-box" id="pts${i}">0</div>
    </div>`).join('');
  updateRanks();
}

function updateBar(i){
  const pct=Math.min((scores[i]/MAX)*100,100);
  const bar=document.getElementById('bar'+i);
  const pts=document.getElementById('pts'+i);
  const runner=document.getElementById('runner'+i);
  if(bar) bar.style.width=pct+'%';
  if(pts) pts.textContent=scores[i];
  if(runner) runner.style.left='calc('+pct+'% - 20px)';
  updateRanks();
}

function updateRanks(){
  scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s).forEach((item,rank)=>{
    const el=document.getElementById('rank'+item.i);
    if(el) el.textContent=medals[rank]||(rank+1);
  });
}

function renderLB(){
  const grid=document.getElementById('lbGrid');
  const sorted=COUNTRIES.map((c,i)=>({c,w:wins[i]})).filter(x=>x.w>0).sort((a,b)=>b.w-a.w).slice(0,6);
  if(!sorted.length){grid.innerHTML='<span style="font-size:26px;color:rgba(255,255,255,0.3)">ابدأ السباق!</span>';return;}
  grid.innerHTML=sorted.map((x,r)=>`<div class="lb-item"><span>${medals[r]||'🏅'}</span><span>${getFlag(x.c.code)}</span><span>${x.c.name}</span><span class="lb-wins">${x.w}</span></div>`).join('');
}

function renderGifters(){
  const el=document.getElementById('giftersList');
  if(!topGifters.length){el.innerHTML='';return;}
  el.innerHTML=topGifters.slice(0,3).map((g,i)=>`<div class="gifter-item"><span>${medals[i]}</span><span>${g.name}</span><span class="gifter-badge">${g.total}</span></div>`).join('');
}

function setFeed(idx,name){
  const el=document.getElementById('feedLine');
  el.textContent=`@${name} أرسل ${COUNTRIES[idx].gift} لدعم ${COUNTRIES[idx].name} ${getFlag(COUNTRIES[idx].code)}`;
  el.style.animation='none';void el.offsetWidth;el.style.animation='fadeUp 0.3s ease';
}

function triggerWin(idx){
  busy=true;
  spawnConfetti();
  document.getElementById('winFlag').textContent=getFlag(COUNTRIES[idx].code);
  document.getElementById('winName').textContent=COUNTRIES[idx].name;
  document.getElementById('winOverlay').classList.add('show');
  setTimeout(()=>{
    document.getElementById('winOverlay').classList.remove('show');
    document.getElementById('confetti').classList.remove('show');
    document.getElementById('confetti').innerHTML='';
    busy=false;
  },3000);
}

function spawnConfetti(){
  const c=document.getElementById('confetti');
  c.innerHTML='';c.classList.add('show');
  const colors=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#DDA0DD'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');el.className='cp';
    el.style.left=Math.random()*1080+'px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration=(2+Math.random()*3)+'s';
    el.style.animationDelay=Math.random()*1+'s';
    c.appendChild(el);
  }
}

async function fetchState(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/game_state?id=eq.session`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    const data=await res.json();
    if(data&&data[0]){
      const newScores=(data[0].scores||[]).slice(0,11).map(s=>parseInt(s)||0);
      const newWins=(data[0].wins||[]).slice(0,11).map(w=>parseInt(w)||0);
      const newGifters=data[0].top_gifters||[];

      // Detect wins by comparing
      newWins.forEach((w,i)=>{
        if(w>prevWins[i]&&!busy){
          triggerWin(i);
        }
      });

      // Update scores
      newScores.forEach((s,i)=>{
        if(s!==scores[i]){
          scores[i]=s;updateBar(i);
          if(s>prevScores[i]&&newGifters.length) setFeed(i,newGifters[0]?.name||'');
        }
      });

      wins=[...newWins];
      prevWins=[...newWins];
      prevScores=[...newScores];
      topGifters=newGifters;
      renderLB();renderGifters();
    }
  }catch(e){}
}

setInterval(()=>{
  seconds=seconds>0?seconds-1:300;
  const m=Math.floor(seconds/60).toString().padStart(2,'0');
  const s=(seconds%60).toString().padStart(2,'0');
  document.getElementById('timer').textContent=m+':'+s;
},1000);

renderTracks();renderLB();renderGifters();
fetchState();
setInterval(fetchState,1000);
</script>
</body>
</html>
