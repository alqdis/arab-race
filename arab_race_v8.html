<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سباق الدول العربية</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100vh;
  overflow:hidden;
  background:linear-gradient(180deg,#0a0020 0%,#0d0025 50%,#0a0020 100%);
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  color:white;
  display:flex;flex-direction:column;
  padding:0.6vh 1.2vw;gap:0.4vh;
}
.lb{
  background:rgba(0,0,30,0.8);
  border:1.5px solid rgba(255,215,0,0.3);
  border-radius:1.2vh;padding:0.6vh 1.5vw;
  display:flex;flex-direction:column;gap:0.3vh;
  flex-shrink:0;
}
.lb-title{color:#FFD700;font-size:1.8vh;font-weight:bold;text-align:center}
.lb-grid-inner{display:flex;flex-wrap:wrap;gap:0.4vw;justify-content:center}
.lb-item{display:flex;align-items:center;gap:0.3vw;background:rgba(255,255,255,0.1);border-radius:0.8vh;padding:0.3vh 0.8vw;font-size:1.6vh;border:1px solid rgba(255,215,0,0.15)}
.lb-wins{background:#FFD700;color:#000;border-radius:0.6vh;padding:0 0.5vw;font-size:1.5vh;font-weight:bold}
.tracks{display:flex;flex-direction:column;gap:0.4vh;flex:1;overflow:hidden}
.track-row{
  display:flex;align-items:center;gap:0.6vw;
  background:rgba(0,0,30,0.75);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:1.2vh;padding:0.4vh 0.8vw;flex:1;
}
.left-info{display:flex;align-items:center;gap:0.4vw;min-width:20vw;max-width:20vw;direction:rtl}
.rnk{font-size:1.5vh;min-width:1.8vw;text-align:center}
.flag-big{font-size:2.6vh;min-width:3vw}
.name-gift{display:flex;flex-direction:column;gap:0.1vh;text-align:right}
.cname{font-size:1.7vh;color:white;font-weight:600;white-space:nowrap}
.gift-row{display:flex;align-items:center;gap:0.3vw;flex-direction:row-reverse}
.gift-img{width:2.4vh;height:2.4vh;object-fit:contain;border-radius:0.4vh}
.track-wrap{flex:1;height:2.8vh;background:rgba(255,255,255,0.08);border-radius:1.5vh;position:relative;overflow:visible;direction:ltr}
.track-bar{height:100%;border-radius:1.5vh;min-width:0;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);position:relative}
.flag-runner{position:absolute;top:50%;transform:translateY(-50%);font-size:2.2vh;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.8));transition:left 0.5s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;z-index:2;left:0}
.pts-box{min-width:3vw;text-align:center;font-size:1.6vh;color:rgba(255,255,255,0.7);font-weight:bold}
.win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.win-overlay.show{display:flex}
.win-flag-big{font-size:15vh;animation:popIn 0.4s ease}
.win-country{font-size:10vh;font-weight:bold;color:#FFD700;text-shadow:0 0 60px rgba(255,215,0,1);animation:glow 0.6s ease infinite alternate;margin:2vh 0;text-align:center}
.win-sub{font-size:5vh;color:rgba(255,255,255,0.7)}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:199;display:none}
.confetti-c.show{display:block}
.cp{position:absolute;width:1vw;height:1.8vh;border-radius:3px;animation:fall linear forwards}
@keyframes popIn{0%{transform:scale(0.3);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes glow{from{text-shadow:0 0 40px rgba(255,215,0,0.6)}to{text-shadow:0 0 100px rgba(255,215,0,1)}}
@keyframes fall{0%{transform:translateY(-5vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="lb">
  <div class="lb-title">🏆 لوحة الانتصارات</div>
  <div class="lb-grid-inner" id="lbGrid"><span style="font-size:1.6vh;color:rgba(255,255,255,0.3)">ابدأ السباق وتنافس!</span></div>
</div>

<div class="tracks" id="tracks"></div>

<div class="confetti-c" id="confetti"></div>
<div class="win-overlay" id="winOverlay">
  <div class="win-flag-big" id="winFlag"></div>
  <div class="win-country" id="winName"></div>
  <div class="win-sub">فازت بالجولة! 🎉</div>
</div>

<script>
const SUPABASE_URL='https://ujofadjgzwediczrgqjh.supabase.co';
const SUPABASE_KEY='sb_publishable_AHqxelXqBjIwD0obji49qw_3hvgYGXx';
const BASE='https://alqdis.github.io/arab-race/';

function getFlag(code){return[...code].map(c=>String.fromCodePoint(c.charCodeAt(0)+127397)).join('')}

const COUNTRIES=[
  {name:'السعودية',code:'SA',img:'sa.webp',color:'#1B5E20'},
  {name:'الكويت',code:'KW',img:'kw.webp',color:'#B71C1C'},
  {name:'الإمارات',code:'AE',img:'ae.webp',color:'#0D47A1'},
  {name:'مصر',code:'EG',img:'eg.webp',color:'#BF360C'},
  {name:'قطر',code:'QA',img:'qa.webp',color:'#4A148C'},
  {name:'عُمان',code:'OM',img:'om.webp',color:'#004D40'},
  {name:'البحرين',code:'BH',img:'bh.webp',color:'#880E4F'},
  {name:'العراق',code:'IQ',img:'iq.webp',color:'#311B92'},
  {name:'الجزائر',code:'DZ',img:'dz.webp',color:'#1A237E'},
  {name:'المغرب',code:'MA',img:'ma.webp',color:'#7F0000'},
  {name:'ليبيا',code:'LY',img:'ly.webp',color:'#006064'},
];

const MAX=100;
let scores=new Array(11).fill(0);
let wins=new Array(11).fill(0);
let prevWins=new Array(11).fill(0);
let prevScores=new Array(11).fill(0);
let busy=false;
const medals=['🥇','🥈','🥉'];

function renderTracks(){
  document.getElementById('tracks').innerHTML=COUNTRIES.map((c,i)=>`
    <div class="track-row">
      <div class="left-info">
        <div class="rnk" id="rank${i}">-</div>
        <div class="flag-big">${getFlag(c.code)}</div>
        <div class="name-gift">
          <div class="cname">${c.name}</div>
          <div class="gift-row">
            <img class="gift-img" src="${BASE}${c.img}" alt="${c.name}">
          </div>
        </div>
      </div>
      <div class="track-wrap">
        <div class="track-bar" id="bar${i}" style="width:0%;background:${c.color}"></div>
        <span class="flag-runner" id="runner${i}">${getFlag(c.code)}</span>
      </div>
      <div class="pts-box" id="pts${i}">0</div>
    </div>`).join('');
  updateRanks();
}

function updateBar(i){
  const pct=Math.min((scores[i]/MAX)*100,100);
  const bar=document.getElementById('bar'+i);
  const pts=document.getElementById('pts'+i);
  const runner=document.getElementById('runner'+i);
  if(bar) bar.style.width=pct+'%';
  if(pts) pts.textContent=scores[i];
  if(runner) runner.style.left='calc('+pct+'% - 1.2vw)';
  updateRanks();
}

function updateRanks(){
  scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s).forEach((item,rank)=>{
    const el=document.getElementById('rank'+item.i);
    if(el) el.textContent=medals[rank]||(rank+1);
  });
}

function renderLB(){
  const grid=document.getElementById('lbGrid');
  const sorted=COUNTRIES.map((c,i)=>({c,w:wins[i]})).filter(x=>x.w>0).sort((a,b)=>b.w-a.w).slice(0,6);
  if(!sorted.length){grid.innerHTML='<span style="font-size:1.6vh;color:rgba(255,255,255,0.3)">ابدأ السباق وتنافس!</span>';return;}
  grid.innerHTML=sorted.map((x,r)=>`<div class="lb-item"><span>${medals[r]||'🏅'}</span><span>${getFlag(x.c.code)}</span><span>${x.c.name}</span><span class="lb-wins">${x.w}</span></div>`).join('');
}

function triggerWin(idx){
  busy=true;
  spawnConfetti();
  document.getElementById('winFlag').textContent=getFlag(COUNTRIES[idx].code);
  document.getElementById('winName').textContent=COUNTRIES[idx].name;
  document.getElementById('winOverlay').classList.add('show');
  setTimeout(()=>{
    document.getElementById('winOverlay').classList.remove('show');
    document.getElementById('confetti').classList.remove('show');
    document.getElementById('confetti').innerHTML='';
    busy=false;
  },3000);
}

function spawnConfetti(){
  const c=document.getElementById('confetti');
  c.innerHTML='';c.classList.add('show');
  const colors=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#DDA0DD'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');el.className='cp';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration=(2+Math.random()*3)+'s';
    el.style.animationDelay=Math.random()*1+'s';
    c.appendChild(el);
  }
}

async function fetchState(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/game_state?id=eq.session`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    const data=await res.json();
    if(data&&data[0]){
      const newScores=(data[0].scores||[]).slice(0,11).map(s=>parseInt(s)||0);
      const newWins=(data[0].wins||[]).slice(0,11).map(w=>parseInt(w)||0);
      newWins.forEach((w,i)=>{if(w>prevWins[i]&&!busy)triggerWin(i);});
      newScores.forEach((s,i)=>{if(s!==scores[i]){scores[i]=s;updateBar(i);}});
      wins=[...newWins];prevWins=[...newWins];prevScores=[...newScores];
      renderLB();
    }
  }catch(e){}
}

renderTracks();renderLB();
fetchState();
setInterval(fetchState,1000);
</script>
</body>
</html>
