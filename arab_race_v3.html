<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سباق الدول العربية</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080820;
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  color: white;
  min-height: 100vh;
  padding: 8px;
  overflow-x: hidden;
}

/* ===== TOP PANELS ===== */
.top-panels {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.panel {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 7px 9px;
}
.panel-title {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 5px;
  text-align: center;
}
.panel-row {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  margin-bottom: 3px;
  color: rgba(255,255,255,0.85);
}
.medal { font-size: 12px; min-width: 16px; }
.panel-name { flex: 1; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.panel-count {
  background: rgba(255,215,0,0.2);
  color: #FFD700;
  border-radius: 8px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: bold;
}
.streak-badge {
  background: rgba(255,100,0,0.25);
  color: #FF8C00;
  border-radius: 8px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: bold;
}
.empty-row { font-size: 10px; color: rgba(255,255,255,0.25); text-align: center; padding: 4px 0; }

/* ===== LEADERBOARD ===== */
.leaderboard {
  background: rgba(255,215,0,0.07);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 10px;
  padding: 7px 10px;
  margin-bottom: 8px;
}
.lb-title { color: #FFD700; font-size: 12px; margin-bottom: 6px; text-align: center; }
.lb-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.lb-item {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 16px; padding: 2px 7px; font-size: 11px;
}
.lb-wins {
  background: #FFD700; color: #000;
  border-radius: 8px; padding: 1px 5px;
  font-size: 10px; font-weight: bold;
}

/* ===== HEADER ===== */
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 7px;
}
.race-title { color: #FFD700; font-size: 14px; }
.timer-box {
  background: rgba(255,215,0,0.15);
  border: 1px solid rgba(255,215,0,0.4);
  color: #FFD700; padding: 3px 12px;
  border-radius: 20px; font-size: 13px; font-weight: bold;
}

/* ===== LEGEND ===== */
.legend-wrap {
  background: rgba(255,255,255,0.03);
  border-radius: 10px; padding: 6px 8px; margin-bottom: 8px;
}
.legend-title { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 4px; }
.legend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap: 3px;
}
.legend-tag {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.04);
  border-radius: 7px; padding: 2px 6px;
}
.legend-gift { color: #FFD700; }

/* ===== TRACKS ===== */
.tracks { display: flex; flex-direction: column; gap: 5px; }
.track-row {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.04);
  border-radius: 9px; padding: 5px 6px;
}
.rank-num { font-size: 11px; min-width: 18px; text-align: center; }
.flag-cell { font-size: 18px; min-width: 24px; }
.name-cell { font-size: 10px; min-width: 50px; color: rgba(255,255,255,0.9); }
.track-wrap {
  flex: 1; height: 20px;
  background: rgba(255,255,255,0.07);
  border-radius: 10px; position: relative; overflow: visible;
}
.track-bar {
  height: 100%; border-radius: 10px; min-width: 4px;
  transition: width 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.flag-mover {
  position: absolute; right: -11px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  transition: right 0.35s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.pts-cell {
  font-size: 10px; color: rgba(255,255,255,0.5);
  min-width: 28px; text-align: center;
}

/* ===== FEED ===== */
.feed {
  margin-top: 7px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px; padding: 5px 9px;
  height: 30px; overflow: hidden;
}
.feed-line {
  font-size: 10px; color: rgba(255,255,255,0.6);
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== WIN CELEBRATION ===== */
.win-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center; justify-content: center;
  flex-direction: column;
}
.win-overlay.show { display: flex; }
.win-flag-big { font-size: 80px; animation: popIn 0.4s ease; }
.win-country-name {
  font-size: 52px; font-weight: bold;
  color: #FFD700;
  text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
  animation: glow 0.6s ease infinite alternate;
  margin: 10px 0;
}
.win-subtitle { font-size: 20px; color: rgba(255,255,255,0.7); }
.confetti-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 199;
  display: none;
}
.confetti-container.show { display: block; }
.confetti-piece {
  position: absolute; width: 8px; height: 14px;
  border-radius: 2px;
  animation: fall linear forwards;
}

@keyframes popIn {
  0%   { transform: scale(0.3); opacity:0; }
  70%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity:1; }
}
@keyframes glow {
  from { text-shadow: 0 0 20px rgba(255,215,0,0.6); }
  to   { text-shadow: 0 0 50px rgba(255,215,0,1), 0 0 80px rgba(255,150,0,0.6); }
}
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
}

/* ===== TEST BUTTONS ===== */
.test-area {
  margin-top: 8px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px; padding: 7px 9px;
}
.test-title { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 5px; }
.btn-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.gift-btn {
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 12px; padding: 3px 8px;
  font-size: 10px; color: white; cursor: pointer;
  transition: all 0.15s; font-family: inherit;
}
.gift-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.05); }
</style>
</head>
<body>

<!-- TOP 3 PANELS -->
<div class="top-panels">
  <div class="panel">
    <div class="panel-title">🎁 أكثر المرسلين هدايا</div>
    <div id="topGifters"><div class="empty-row">لا أحد بعد</div></div>
  </div>
  <div class="panel">
    <div class="panel-title">❤️ أكثر الضاغطين لايك</div>
    <div id="topLikers"><div class="empty-row">لا أحد بعد</div></div>
  </div>
  <div class="panel">
    <div class="panel-title">🔥 أعلى ستريك هدايا</div>
    <div id="topStreak"><div class="empty-row">لا أحد بعد</div></div>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="leaderboard">
  <div class="lb-title">🏆 لوحة انتصارات الدول</div>
  <div class="lb-grid" id="lbGrid"><span style="font-size:11px;color:rgba(255,255,255,0.3)">ابدأ السباق لتظهر الانتصارات!</span></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="race-title">🏁 سباق الدول العربية</div>
  <div class="timer-box" id="timer">05:00</div>
</div>

<!-- LEGEND -->
<div class="legend-wrap">
  <div class="legend-title">أرسل هديتك لتحريك علم بلدك خطوة للأمام 👇</div>
  <div class="legend-grid" id="legendGrid"></div>
</div>

<!-- TRACKS -->
<div class="tracks" id="tracks"></div>

<!-- FEED -->
<div class="feed"><div class="feed-line" id="feedLine">أرسل هديتك لدعم بلدك! 🎁</div></div>

<!-- WIN OVERLAY -->
<div class="confetti-container" id="confetti"></div>
<div class="win-overlay" id="winOverlay">
  <div class="win-flag-big" id="winFlagBig"></div>
  <div class="win-country-name" id="winCountryName"></div>
  <div class="win-subtitle">فازت بالجولة! 🎉</div>
</div>

<!-- TEST BUTTONS -->
<div class="test-area">
  <div class="test-title">للتجربة فقط — اضغط لمحاكاة هدية:</div>
  <div class="btn-grid" id="btnGrid"></div>
</div>

<script>
/* ============================
   DATA
   ============================ */
function getFlag(code) {
  return [...code].map(c => String.fromCodePoint(c.charCodeAt(0)+127397)).join('');
}

const COUNTRIES = [
  { name:'السعودية', code:'SA', gift:'روز 🌹',           color:'#2E7D32' },
  { name:'الكويت',   code:'KW', gift:'GG 🎮',             color:'#C62828' },
  { name:'الإمارات', code:'AE', gift:'قوة الماسة 💎',     color:'#1565C0' },
  { name:'مصر',      code:'EG', gift:'أحب مصر 🇪🇬',       color:'#BF360C' },
  { name:'قطر',      code:'QA', gift:'أحبك كثيراً 💕',    color:'#6A1B9A' },
  { name:'عُمان',    code:'OM', gift:'نغمة فرح 🎵',       color:'#00695C' },
  { name:'البحرين',  code:'BH', gift:'تيك توك 🎵',        color:'#AD1457' },
  { name:'العراق',   code:'IQ', gift:'يالا يا حبيبي 🎶',  color:'#4527A0' },
  { name:'الجزائر',  code:'DZ', gift:'عصا مضيئة ✨',      color:'#1A237E' },
  { name:'المغرب',   code:'MA', gift:'أحب المغرب 🇲🇦',     color:'#B71C1C' },
  { name:'ليبيا',    code:'LY', gift:'آيس كريم 🍦',       color:'#006064' },
  { name:'سوريا',    code:'SY', gift:'أحبك كثيراً 💕',    color:'#4E342E' },
  { name:'اليمن',    code:'YE', gift:'شظية الأمل 💫',     color:'#558B2F' },
  { name:'لبنان',    code:'LB', gift:'مزاح خفيف 😄',      color:'#1B5E20' },
  { name:'الأردن',   code:'JO', gift:'قطعة كعك 🎂',       color:'#E65100' },
  { name:'فلسطين',   code:'PS', gift:'طرب قديم 🎸',       color:'#37474F' },
  { name:'تونس',     code:'TN', gift:'طرب قديم 🎸',       color:'#880E4F' },
];

const MAX_SCORE = 100;
const STEP = 1;
let scores  = new Array(COUNTRIES.length).fill(0);
let wins    = new Array(COUNTRIES.length).fill(0);
let seconds = 300;
let busy    = false;

/* ============================
   USER STATS
   ============================ */
// gifters: { name: count }
// likers:  { name: count }
// streak:  { name, current, best }
let gifters = {};
let likers  = {};
let streaks = {};   // name -> { current, best }
let lastGifter = null;

const NAMES = ['أحمد','فاطمة','محمد','سارة','خالد','نورة','علي','منى','عمر','ريم','يوسف','لينا','بدر','هند','جاسم','شيخة'];
const rand = arr => arr[Math.floor(Math.random()*arr.length)];

function recordGift(name) {
  gifters[name] = (gifters[name]||0) + 1;
  // streak
  if (!streaks[name]) streaks[name] = { current:0, best:0 };
  if (lastGifter === name) {
    streaks[name].current++;
  } else {
    if (lastGifter && streaks[lastGifter]) streaks[lastGifter].current = 0;
    streaks[name].current = 1;
  }
  if (streaks[name].current > streaks[name].best) streaks[name].best = streaks[name].current;
  lastGifter = name;
  renderTopGifters();
  renderTopStreak();
}

function recordLike(name) {
  likers[name] = (likers[name]||0) + 1;
  renderTopLikers();
}

function topN(obj, n) {
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

function renderTopGifters() {
  const top = topN(gifters, 3);
  const medals = ['🥇','🥈','🥉'];
  const el = document.getElementById('topGifters');
  if (!top.length) { el.innerHTML='<div class="empty-row">لا أحد بعد</div>'; return; }
  el.innerHTML = top.map(([name,cnt],i)=>`
    <div class="panel-row">
      <span class="medal">${medals[i]}</span>
      <span class="panel-name">@${name}</span>
      <span class="panel-count">${cnt}</span>
    </div>`).join('');
}

function renderTopLikers() {
  const top = topN(likers, 5);
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  const el = document.getElementById('topLikers');
  if (!top.length) { el.innerHTML='<div class="empty-row">لا أحد بعد</div>'; return; }
  el.innerHTML = top.map(([name,cnt],i)=>`
    <div class="panel-row">
      <span class="medal">${medals[i]}</span>
      <span class="panel-name">@${name}</span>
      <span class="panel-count">${cnt}</span>
    </div>`).join('');
}

function renderTopStreak() {
  const top = Object.entries(streaks)
    .sort((a,b)=>b[1].best-a[1].best).slice(0,3);
  const medals = ['🥇','🥈','🥉'];
  const el = document.getElementById('topStreak');
  if (!top.length) { el.innerHTML='<div class="empty-row">لا أحد بعد</div>'; return; }
  el.innerHTML = top.map(([name,s],i)=>`
    <div class="panel-row">
      <span class="medal">${medals[i]}</span>
      <span class="panel-name">@${name}</span>
      <span class="streak-badge">🔥${s.best}</span>
    </div>`).join('');
}

/* ============================
   LEADERBOARD
   ============================ */
function renderLB() {
  const grid = document.getElementById('lbGrid');
  const sorted = COUNTRIES.map((c,i)=>({c,w:wins[i]}))
    .filter(x=>x.w>0).sort((a,b)=>b.w-a.w).slice(0,10);
  if (!sorted.length) {
    grid.innerHTML='<span style="font-size:11px;color:rgba(255,255,255,0.3)">ابدأ السباق!</span>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  grid.innerHTML = sorted.map((x,r)=>`
    <div class="lb-item">
      <span>${medals[r]||'🏅'}</span>
      <span>${getFlag(x.c.code)}</span>
      <span>${x.c.name}</span>
      <span class="lb-wins">${x.w}</span>
    </div>`).join('');
}

/* ============================
   LEGEND
   ============================ */
function renderLegend() {
  document.getElementById('legendGrid').innerHTML = COUNTRIES.map(c=>`
    <div class="legend-tag">
      ${getFlag(c.code)}
      <span>${c.name}</span>
      <span>←</span>
      <span class="legend-gift">${c.gift}</span>
    </div>`).join('');
}

/* ============================
   TRACKS
   ============================ */
function renderTracks() {
  document.getElementById('tracks').innerHTML = COUNTRIES.map((c,i)=>{
    const pct = Math.min((scores[i]/MAX_SCORE)*100,100);
    return `
    <div class="track-row">
      <div class="rank-num" id="rank${i}">-</div>
      <div class="flag-cell">${getFlag(c.code)}</div>
      <div class="name-cell">${c.name}</div>
      <div class="track-wrap">
        <div class="track-bar" id="bar${i}" style="width:${pct}%;background:${c.color}">
          <span class="flag-mover">${getFlag(c.code)}</span>
        </div>
      </div>
      <div class="pts-cell" id="pts${i}">${scores[i]}</div>
    </div>`;
  }).join('');
  updateRanks();
}

function updateRanks() {
  const sorted = scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);
  const medals=['🥇','🥈','🥉'];
  sorted.forEach((item,rank)=>{
    const el=document.getElementById('rank'+item.i);
    if(el) el.textContent = medals[rank]||(rank+1);
  });
}

/* ============================
   SCORE
   ============================ */
function addScore(idx, senderName) {
  if (busy) return;
  const name = senderName || rand(NAMES);
  recordGift(name);

  scores[idx] = Math.min(scores[idx]+STEP, MAX_SCORE);
  const pct = (scores[idx]/MAX_SCORE)*100;
  const bar = document.getElementById('bar'+idx);
  const pts = document.getElementById('pts'+idx);
  if (bar) bar.style.width = pct+'%';
  if (pts) pts.textContent = scores[idx];
  updateRanks();
  setFeed(idx, name);
  if (scores[idx]>=MAX_SCORE) triggerWin(idx);
}

/* ============================
   WIN CELEBRATION
   ============================ */
function triggerWin(idx) {
  busy = true;
  wins[idx]++;
  renderLB();

  // Confetti
  spawnConfetti();

  // Overlay
  const overlay = document.getElementById('winOverlay');
  document.getElementById('winFlagBig').textContent = getFlag(COUNTRIES[idx].code);
  document.getElementById('winCountryName').textContent = COUNTRIES[idx].name;
  overlay.classList.add('show');

  // After 3 seconds — reset winner only
  setTimeout(()=>{
    overlay.classList.remove('show');
    document.getElementById('confetti').classList.remove('show');
    document.getElementById('confetti').innerHTML='';

    scores[idx] = 0;
    const bar = document.getElementById('bar'+idx);
    const pts = document.getElementById('pts'+idx);
    if(bar) bar.style.width='0%';
    if(pts) pts.textContent='0';
    updateRanks();
    busy = false;
  }, 3000);
}

function spawnConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML='';
  container.classList.add('show');
  const colors=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98FB98'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (1.5+Math.random()*2)+'s';
    el.style.animationDelay = Math.random()*0.8+'s';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    container.appendChild(el);
  }
}

/* ============================
   FEED
   ============================ */
function setFeed(idx, name) {
  const el = document.getElementById('feedLine');
  el.textContent = `@${name} أرسل ${COUNTRIES[idx].gift} لدعم ${COUNTRIES[idx].name} ${getFlag(COUNTRIES[idx].code)}`;
  el.style.animation='none';
  void el.offsetWidth;
  el.style.animation='fadeUp 0.3s ease';
}

/* ============================
   TIMER
   ============================ */
setInterval(()=>{
  seconds = seconds>0 ? seconds-1 : 300;
  const m=Math.floor(seconds/60).toString().padStart(2,'0');
  const s=(seconds%60).toString().padStart(2,'0');
  document.getElementById('timer').textContent=m+':'+s;
},1000);

/* ============================
   SIMULATE LIKES (random for demo)
   ============================ */
setInterval(()=>{
  if(Math.random()<0.3) recordLike(rand(NAMES));
},4000);

/* ============================
   TIKTOK WEBHOOK LISTENER
   (TikFinity يرسل الأحداث هنا)
   ============================ */
window.addEventListener('message', (event)=>{
  try {
    const data = typeof event.data==='string' ? JSON.parse(event.data) : event.data;
    if(!data || !data.type) return;

    if(data.type==='gift'){
      const giftName = (data.giftName||'').toLowerCase().trim();
      const sender   = data.username || rand(NAMES);
      const idx = COUNTRIES.findIndex(c=>
        giftName.includes(c.gift.replace(/[^\w\u0600-\u06FF]/g,'').toLowerCase().trim()) ||
        matchGift(giftName, c)
      );
      if(idx>=0) addScore(idx, sender);
    }

    if(data.type==='like'){
      const sender = data.username || rand(NAMES);
      recordLike(sender);
    }
  } catch(e){}
});

function matchGift(giftName, country) {
  const map = {
    'SA': ['rose','روز'],
    'KW': ['gg'],
    'AE': ['diamond power','قوة الماسة'],
    'EG': ['i love egypt','أحب مصر','love egypt'],
    'QA': ['i love you so much','أحبك كثيراً','love you so much'],
    'OM': ['melody of joy','نغمة فرح'],
    'BH': ['tiktok','تيك توك'],
    'IQ': ['yalla habibi','يالا يا حبيبي'],
    'DZ': ['glowing stick','عصا مضيئة'],
    'MA': ['i love morocco','أحب المغرب','love morocco'],
    'LY': ['ice cream','آيس كريم'],
    'SY': ['i love you so much','أحبك كثيراً'],
    'YE': ['hope shard','شظية الأمل'],
    'LB': ['light humor','مزاح خفيف'],
    'JO': ['piece of cake','قطعة كعك'],
    'PS': ['old music','طرب قديم'],
    'TN': ['old music','طرب قديم'],
  };
  const keys = map[country.code]||[];
  return keys.some(k=>giftName.includes(k));
}

/* ============================
   TEST BUTTONS
   ============================ */
function buildButtons(){
  document.getElementById('btnGrid').innerHTML = COUNTRIES.map((c,i)=>`

}
