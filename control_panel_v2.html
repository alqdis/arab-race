<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لوحة التحكم</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a1a;color:white;font-family:'Segoe UI',Tahoma,Arial,sans-serif;min-height:100vh;padding:10px;display:flex;flex-direction:column;gap:8px}
.header{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.header-title{color:#FFD700;font-size:14px;font-weight:bold}
.status{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,0.1)}
.status.ok{background:rgba(0,255,0,0.15);color:#4eff4e}
.status.err{background:rgba(255,0,0,0.15);color:#ff6b6b}
.top3{background:rgba(255,255,255,0.05);border-radius:10px;padding:8px 10px}
.top3-title{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:6px;text-align:center}
.top3-row{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border-radius:8px;padding:4px 8px;margin-bottom:3px}
.top3-medal{font-size:14px;min-width:20px}
.top3-name{flex:1;font-size:12px}
.top3-count{background:#FFD700;color:#000;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:bold}
.top3-empty{font-size:11px;color:rgba(255,255,255,0.3);text-align:center;padding:4px}
.add-section{background:rgba(255,255,255,0.05);border-radius:10px;padding:8px 10px}
.add-title{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:6px}
.add-row{display:flex;gap:6px}
.name-input{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 10px;color:white;font-size:13px;font-family:inherit;outline:none}
.name-input::placeholder{color:rgba(255,255,255,0.3)}
.add-btn{background:#FFD700;color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:bold;cursor:pointer}
.search-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:7px 10px;color:white;font-size:13px;font-family:inherit;outline:none;margin-top:6px}
.search-input::placeholder{color:rgba(255,255,255,0.3)}
.names-section{background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 10px}
.names-title{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:6px}
.names-list{display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto}
.name-row{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border-radius:8px;padding:5px 8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.name-row.selected{border-color:#FFD700;background:rgba(255,215,0,0.1)}
.nr-name{flex:1;font-size:12px}
.nr-count{background:rgba(255,215,0,0.2);color:#FFD700;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:bold}
.nr-del{background:rgba(255,50,50,0.2);color:#ff6b6b;border:none;border-radius:5px;padding:2px 6px;font-size:10px;cursor:pointer;font-family:inherit}
.selected-bar{background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);border-radius:10px;padding:6px 12px;text-align:center;display:none}
.selected-bar.show{display:block}
.selected-label{font-size:10px;color:rgba(255,255,255,0.5)}
.selected-name{font-size:15px;color:#FFD700;font-weight:bold}
.countries-section{background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 10px}
.countries-title{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:6px;text-align:center}
.countries-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.country-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;transition:all 0.15s;color:white}
.country-btn:active{transform:scale(0.92);background:rgba(255,215,0,0.2)}
.country-flag{font-size:20px}
.country-name-btn{font-size:8px;color:rgba(255,255,255,0.7);text-align:center}
.reset-btn{background:rgba(255,50,50,0.2);border:1px solid rgba(255,50,50,0.3);color:#ff6b6b;border-radius:8px;padding:6px;font-size:11px;cursor:pointer;font-family:inherit;width:100%}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:white;padding:8px 16px;border-radius:20px;font-size:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🎮 لوحة التحكم</div>
  <div class="status" id="status">جاري الاتصال...</div>
</div>

<div class="top3">
  <div class="top3-title">🏆 أكثر المرسلين هدايا</div>
  <div id="top3Grid"><div class="top3-empty">لا أحد بعد</div></div>
</div>

<div class="add-section">
  <div class="add-title">➕ أضف اسم مرسل جديد</div>
  <div class="add-row">
    <input class="name-input" id="nameInput" type="text" placeholder="اكتب الاسم...">
    <button class="add-btn" onclick="addName()">حفظ</button>
  </div>
  <input class="search-input" id="searchInput" type="text" placeholder="🔍 ابحث عن اسم..." oninput="renderNames()">
</div>

<div class="names-section">
  <div class="names-title">👥 اضغط اسم لاختياره</div>
  <div class="names-list" id="namesList"></div>
</div>

<div class="selected-bar" id="selectedBar">
  <div class="selected-label">المرسل المختار:</div>
  <div class="selected-name" id="selectedName">—</div>
</div>

<div class="countries-section">
  <div class="countries-title">اضغط علم الدولة التي دعمها</div>
  <div class="countries-grid" id="countriesGrid"></div>
</div>

<button class="reset-btn" onclick="resetSession()">🔄 إعادة تشغيل جلسة جديدة</button>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ujofadjgzwediczrgqjh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AHqxelXqBjIwD0obji49qw_3hvgYGXx';

function getFlag(code){return[...code].map(c=>String.fromCodePoint(c.charCodeAt(0)+127397)).join('')}

const COUNTRIES=[
  {name:'السعودية',code:'SA'},{name:'الكويت',code:'KW'},
  {name:'الإمارات',code:'AE'},{name:'مصر',code:'EG'},
  {name:'قطر',code:'QA'},{name:'عُمان',code:'OM'},
  {name:'البحرين',code:'BH'},{name:'العراق',code:'IQ'},
  {name:'الجزائر',code:'DZ'},{name:'المغرب',code:'MA'},
  {name:'ليبيا',code:'LY'},{name:'سوريا',code:'SY'},
  {name:'لبنان',code:'LB'},{name:'الأردن',code:'JO'},
  {name:'فلسطين',code:'PS'},{name:'تونس',code:'TN'},
];

// Local state
let names = JSON.parse(localStorage.getItem('race_names')||'[]');
let selectedIdx = null;
let scores = new Array(16).fill(0);

// ===== SUPABASE HELPERS =====
async function sbGet(table, filter=''){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  return res.json();
}

async function sbPatch(table, filter, body){
  await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`,{
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(body)
  });
}

async function sbPost(table, body){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(body)
  });
  return res.json();
}

async function sbDelete(table, filter){
  await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
}

// ===== INIT =====
async function init(){
  try{
    const data = await sbGet('game_state','?id=eq.session');
    if(data && data[0]) scores = data[0].scores || new Array(16).fill(0);
    setStatus(true);
  } catch(e){ setStatus(false); }
  renderNames();
  renderTop3();
  buildCountries();
}

function setStatus(ok){
  const el=document.getElementById('status');
  el.textContent = ok ? '✅ متصل' : '❌ خطأ';
  el.className = 'status ' + (ok?'ok':'err');
}

// ===== SEND GIFT =====
async function sendGift(countryIdx){
  if(selectedIdx===null){showToast('⚠️ اختر اسم مرسل أولاً');return;}
  const person = names[selectedIdx];
  const country = COUNTRIES[countryIdx];

  // Update streak
  if(person.lastCountry===country.code) person.streak++;
  else { person.streak=1; person.lastCountry=country.code; }
  person.total++;

  // Update scores
  scores[countryIdx]++;
  if(scores[countryIdx]>=100) scores[countryIdx]=0;

  saveNames();
  renderNames();
  renderTop3();

  // Send to Supabase
  try{
    await sbPatch('game_state','?id=eq.session',{
      scores: scores,
      updated_at: new Date().toISOString()
    });
    showToast(`${getFlag(country.code)} ${country.name} +1 | ${person.name} (${person.total})`);
  } catch(e){
    showToast('⚠️ خطأ في الإرسال');
  }
}

// ===== RESET =====
async function resetSession(){
  if(!confirm('هل تريد إعادة تشغيل جلسة جديدة؟')) return;
  scores = new Array(16).fill(0);
  try{
    await sbPatch('game_state','?id=eq.session',{
      scores: scores,
      wins: new Array(16).fill(0),
      updated_at: new Date().toISOString()
    });
    showToast('✅ تمت إعادة التشغيل');
  } catch(e){ showToast('خطأ'); }
}

// ===== NAMES =====
function saveNames(){ localStorage.setItem('race_names', JSON.stringify(names)); }

function addName(){
  const input=document.getElementById('nameInput');
  const val=input.value.trim();
  if(!val){showToast('اكتب اسماً أولاً');return;}
  if(names.find(n=>n.name===val)){showToast('الاسم موجود');input.value='';return;}
  names.push({name:val,total:0,streak:0,lastCountry:null});
  saveNames();
  input.value='';
  renderNames();
  renderTop3();
  showToast(`✅ تم إضافة ${val}`);
}

function selectName(idx){
  selectedIdx=idx;
  document.getElementById('selectedBar').classList.add('show');
  document.getElementById('selectedName').textContent=names[idx].name;
  renderNames();
}

function deleteName(e,idx){
  e.stopPropagation();
  names.splice(idx,1);
  if(selectedIdx===idx){selectedIdx=null;document.getElementById('selectedBar').classList.remove('show');}
  else if(selectedIdx>idx) selectedIdx--;
  saveNames();
  renderNames();
  renderTop3();
}

function renderNames(){
  const filter=document.getElementById('searchInput').value.trim();
  const list=document.getElementById('namesList');
  const filtered=names.map((p,i)=>({...p,i}))
    .filter(p=>!filter||p.name.includes(filter))
    .sort((a,b)=>b.total-a.total);
  if(!filtered.length){list.innerHTML='<div style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center;padding:8px">لا يوجد</div>';return;}
  list.innerHTML=filtered.map(p=>`
    <div class="name-row ${selectedIdx===p.i?'selected':''}" onclick="selectName(${p.i})">
      <span class="nr-name">${p.name}</span>
      <span class="nr-count">${p.total}</span>
      <button class="nr-del" onclick="deleteName(event,${p.i})">✕</button>
    </div>`).join('');
}

function renderTop3(){
  const grid=document.getElementById('top3Grid');
  const sorted=[...names].sort((a,b)=>b.total-a.total).slice(0,3);
  if(!sorted.length){grid.innerHTML='<div class="top3-empty">لا أحد بعد</div>';return;}
  const medals=['🥇','🥈','🥉'];
  grid.innerHTML=sorted.map((p,i)=>`
    <div class="top3-row">
      <span class="top3-medal">${medals[i]}</span>
      <span class="top3-name">${p.name}</span>
      <span class="top3-count">${p.total}</span>
    </div>`).join('');
}

function buildCountries(){
  document.getElementById('countriesGrid').innerHTML=COUNTRIES.map((c,i)=>`
    <button class="country-btn" onclick="sendGift(${i})">
      <span class="country-flag">${getFlag(c.code)}</span>
      <span class="country-name-btn">${c.name}</span>
    </button>`).join('');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')addName();});
init();
</script>
</body>
</html>
